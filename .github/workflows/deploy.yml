name: Build & Deploy ez-frontend

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ez-frontend
  INFRA_REPO: maisre/ez-infra

jobs:
  # Staging: build Docker image, push to ECR, update infra repo → Argo CD syncs
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      - name: Update image tag in ez-infra
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git clone https://x-access-token:${{ secrets.INFRA_PAT }}@github.com/${{ env.INFRA_REPO }}.git infra
          cd infra

          sed -i "s|tag:.*|tag: \"$IMAGE_TAG\"|" environments/staging/ez-frontend.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "deploy ez-frontend $IMAGE_TAG to staging"
          git push

  # Prod: build Angular, sync to S3, invalidate CloudFront
  deploy-prod:
    runs-on: ubuntu-latest
    if: false  # TODO: enable when ready — or trigger via workflow_dispatch
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build for production
        run: npx ng build --configuration=production

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ez-frontend/browser/ s3://ez-snippet-frontend-prod --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} --paths "/*"
