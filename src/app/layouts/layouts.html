<div *ngIf="usage && !usage.hasPlan" class="no-plan-banner">
  <h2>Subscribe to get started</h2>
  <p>You need an active plan to create and manage layouts.</p>
  <a routerLink="/pricing" class="btn btn-primary">View Plans</a>
</div>

<ng-container *ngIf="usage?.hasPlan">
  <div class="usage-banner">
    <span class="usage-text">{{ limitMessage }}</span>
    <a *ngIf="!canCreate" routerLink="/pricing" class="upgrade-link">Upgrade</a>
  </div>

  <h2>Create New Layout</h2>
  <form (ngSubmit)="createLayout()" *ngIf="canCreate">
    <div>
      <label for="layoutName">Layout Name:</label>
      <input
        id="layoutName"
        type="text"
        [(ngModel)]="newLayout.name"
        name="layoutName"
        required
        placeholder="Enter layout name"
      />
    </div>
    <div>
      <label for="siteName">Site Name (optional):</label>
      <input
        id="siteName"
        type="text"
        [(ngModel)]="newLayout.siteName"
        name="siteName"
        placeholder="Enter site name"
      />
    </div>
    <div>
      <label for="description">Description (optional):</label>
      <input
        id="description"
        type="text"
        [(ngModel)]="newLayout.description"
        name="description"
        placeholder="Enter description"
      />
    </div>
    <button type="submit" [disabled]="!newLayout.name.trim()">Create Layout</button>
  </form>

  <h2>Layouts</h2>
  <ul>
    <li *ngFor="let layout of layouts">
      <span>{{ layout.name || layout.id }}</span>
      <div class="button-group">
        <button (click)="editLayout(layout.id)" class="edit-btn">Edit</button>
      </div>
    </li>
  </ul>
</ng-container>
